services:

  database:
    image: postgres:16
    container_name: postgres-db-gopher-gains
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gopher-gains-db
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: